# =============================================================================
# Tracking Node Parameters
# =============================================================================
# Configuration for tracker_node and dummy_actuator_node
# Target: Raspberry Pi 4 (CPU-only)
# =============================================================================

tracker_node:
  ros__parameters:
    # Class name to track (from YOLO model). Use 'all' to track any class.
    tracking_target_class: "person"

    # Tracker algorithm: "centroid" or "bytetrack"
    tracker_type: "centroid"

    # Camera resolution (must match v4l2_camera settings)
    image_width: 640
    image_height: 480

    # --- CentroidTracker parameters ---
    # Frames to wait before deregistering a lost object
    max_disappeared: 30
    # Max pixel distance to match detections across frames
    max_distance: 80.0

    # --- ByteTrackTracker parameters ---
    # Detections with confidence >= this are "high confidence" (Stage 1)
    track_high_thresh: 0.5
    # Detections with confidence >= this but < high_thresh are "low confidence" (Stage 2)
    # Detections below this are discarded entirely
    track_low_thresh: 0.1
    # IoU match threshold (1 - match_thresh = minimum IoU to accept a match)
    # Lower value = more strict matching
    match_thresh: 0.8

dummy_actuator_node:
  ros__parameters:
    # Human-readable name for this actuator instance
    actuator_name: "dummy_pan_tilt"

    # Status publish rate (Hz)
    status_publish_rate: 2.0

# =============================================================================
# Serial Motor Actuator Node Parameters
# =============================================================================
# Real actuator using UART / USB-Serial to a motor controller board.
# Protocol (control_v1): JSON + newline  →  {"angle1": 90, "angle2": 90}\n
# =============================================================================

serial_motor_actuator_node:
  ros__parameters:
    # Human-readable name for this actuator instance
    actuator_name: "serial_pan_tilt"

    # Status publish rate (Hz)
    status_publish_rate: 2.0

    # --- Serial port settings ---
    # Device path (Linux: /dev/ttyUSB0 or /dev/ttyACM0)
    serial_port: "/dev/ttyUSB0"
    # Baud rate (must match motor controller firmware)
    serial_baud: 115200
    # Read/write timeout in seconds
    serial_timeout: 1.0

    # --- Simulation mode ---
    # true  : no real serial I/O — safe for CI and development without hardware
    # false : real hardware mode — connect USB-serial before launching
    simulation_mode: true

    # --- Angle mapping ---
    # Motor rest / center position (degrees). 90 = center for 0–180 range.
    center_angle: 90.0

    # Pan/tilt gain: degrees of motor movement per unit of tracking error [-1, 1].
    # Set to 0.0 for DEMO MODE: motor always goes to center (90°) when target detected.
    # Set > 0 to enable proportional tracking (e.g. pan_range_deg: 45.0).
    pan_range_deg: 0.0
    tilt_range_deg: 0.0

    # Hardware angle limits (degrees) — clamped before sending to motor
    min_angle: 0.0
    max_angle: 180.0
