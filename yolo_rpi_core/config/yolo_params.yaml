# YOLO Node Parameters
# Configuration file for yolo_rpi_core

yolo_node:
  ros__parameters:
    # Path to YOLO model file (will download if not present)
    model_path: "yolo11n.pt"

    # Device for inference: "cpu" for RPi4, "cuda" for GPU
    device: "cpu"

    # Minimum confidence threshold for detections (0.0 - 1.0)
    conf_threshold: 0.5
